schema: spec-driven

context: |
  Stack: Node.js 22 + TypeScript strict | pnpm + Turborepo monorepo
  Frontend: React 18 + Vite 6 + Tailwind v4 + shadcn (feature-first, atomic design)
  Backend: NestJS 11 + TypeORM + BullMQ | PostgreSQL + Redis
  Landing: Astro 6
  Shared: @akit/contracts (Zod), @akit/design-tokens
  Testing: Jest (api), Vitest + Testing Library React + jsdom (web), Vitest @vitest/ui coverage
  Quality: ESLint 9 + typescript-eslint, Prettier (api), TypeScript strict (both apps)
  Architecture: Hexagonal (NestJS), CQRS where needed, Repository pattern

strict_tdd: true

testing:
  layers:
    unit:
      available: true
      tools:
        - command: pnpm --filter api run test
          framework: Jest
        - command: pnpm --filter web run test
          framework: Vitest
    integration:
      available: true
      tools:
        - Testing Library React + jsdom (web)
        - SQLite3 (api)
    e2e:
      available: false
      tools: []
  coverage:
    available: true
    command: jest --coverage (api) | vitest --coverage (web with @vitest/ui)
  quality:
    linter:
      available: true
      command: eslint
    type_checker:
      available: true
      command: tsc --noEmit
    formatter:
      available: true
      command: prettier --check (api)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
