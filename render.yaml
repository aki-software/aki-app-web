services:
  # ==========================================
  # ENTORNO QA (Rama: dev)
  # ==========================================
  
  # Backend (API) para QA
  - type: web
    name: akit-api-qa
    env: node
    plan: free
    branch: dev
    buildCommand: pnpm install && pnpm --filter api exec puppeteer browsers install chrome && pnpm run build --filter api
    startCommand: pnpm --filter api run start:prod
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/puppeteer
      - key: NODE_ENV
        value: production
      # Variables de Base de Datos (Neon)
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      # Variables JWT
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 8h
      # Variables de Redis (Upstash)
      - key: REDIS_URL
        sync: false
      # Variables de Email
      - key: MAIL_TRANSPORT_TYPE
        value: pro
      - key: MAIL_PRO_HOST
        sync: false
      - key: MAIL_PRO_PORT
        value: "465"
      - key: MAIL_PRO_USER
        sync: false
      - key: MAIL_PRO_PASS
        sync: false
      - key: SMTP_FROM
        value: akituvocacion@akituespacio.com.ar
      # CORS
      - key: CORS_ORIGIN
        sync: false
      # Auth Inicial (Semillas)
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_NAME
        sync: false

  # ==========================================
  # ENTORNO PRODUCCIÓN (Rama: main)
  # ==========================================
  
  # Backend (API) para Producción
  - type: web
    name: akit-api-prod
    env: node
    plan: free
    branch: main
    buildCommand: pnpm install && pnpm --filter api exec puppeteer browsers install chrome && pnpm run build --filter api
    startCommand: pnpm --filter api run start:prod
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/puppeteer
      - key: NODE_ENV
        value: production
      # Variables de Base de Datos (Neon)
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      # Variables JWT
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 8h
      # Variables de Redis (Upstash)
      - key: REDIS_URL
        sync: false
      # Variables de Email
      - key: MAIL_TRANSPORT_TYPE
        value: pro
      - key: MAIL_PRO_HOST
        sync: false
      - key: MAIL_PRO_PORT
        value: "465"
      - key: MAIL_PRO_USER
        sync: false
      - key: MAIL_PRO_PASS
        sync: false
      - key: SMTP_FROM
        value: akituvocacion@akituespacio.com.ar
      # CORS
      - key: CORS_ORIGIN
        sync: false
      # Auth Inicial (Semillas)
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_NAME
        sync: false
