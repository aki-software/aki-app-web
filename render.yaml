services:
  # ==========================================
  # ENTORNO QA (Rama: dev)
  # ==========================================
  
  # Redis para QA (Free tier)
  - type: redis
    name: akit-redis-qa
    plan: free
    ipAllowList: [] # Permite acceso interno desde otros servicios Render

  # Backend (API) para QA
  - type: web
    name: akit-api-qa
    env: node
    branch: dev
    # Instalamos dependencias y buildamos solo la API usando turborepo / pnpm filter
    buildCommand: pnpm install && pnpm run build --filter api
    # Iniciamos solo la API
    startCommand: pnpm --filter api run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: akit-redis-qa
          property: connectionString
      # Variables de BD que se completarán desde el Dashboard de Render
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: JWT_SECRET
        sync: false

  # ==========================================
  # ENTORNO PRODUCCIÓN (Rama: main)
  # ==========================================
  
  # Redis para Producción (Free tier / starter según requieras luego)
  - type: redis
    name: akit-redis-prod
    plan: free
    ipAllowList: []

  # Backend (API) para Producción
  - type: web
    name: akit-api-prod
    env: node
    branch: main
    buildCommand: pnpm install && pnpm run build --filter api
    startCommand: pnpm --filter api run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: akit-redis-prod
          property: connectionString
      # Variables de BD que se completarán desde el Dashboard de Render
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
